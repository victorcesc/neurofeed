# Daily at 07:00 America/Sao_Paulo: runs /usr/local/bin/neurofeed (env from env_file, same as Railway UI).
# Two services = two profiles; no bind-mounted .env files required.
#
# docker compose up -d
#
# One-off:
#   docker compose run --rm neurofeed-default /usr/local/bin/neurofeed
#   docker compose run --rm neurofeed-vanessa /usr/local/bin/neurofeed
services:
  neurofeed-default:
    build: .
    restart: unless-stopped
    env_file: .env

  neurofeed-vanessa:
    build: .
    restart: unless-stopped
    env_file: .env.vanessa
